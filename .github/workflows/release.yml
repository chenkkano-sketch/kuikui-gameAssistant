name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Package app
        id: package
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }

          $version = $version.TrimStart([char[]]@("v", "V"))
          .\scripts\package.ps1 -Version $version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: KuikuiGameAssistant v${{ steps.package.outputs.version }}
          files: |
            artifacts/KuikuiGameAssistant-${{ steps.package.outputs.version }}-win-x64-portable.zip
            artifacts/KuikuiGameAssistant-${{ steps.package.outputs.version }}-setup.exe
          body: |
            ## 下载版本

            本次发布版本：v${{ steps.package.outputs.version }}

            ## 下载文件

            - 安装版：KuikuiGameAssistant-${{ steps.package.outputs.version }}-setup.exe
            - 便携版：KuikuiGameAssistant-${{ steps.package.outputs.version }}-win-x64-portable.zip

            安装版适合长期使用；便携版解压后直接运行 `KuikuiGameAssistant.exe`。

            ## v1.0.1 更新内容

            - 新增游戏滤镜页面：支持亮度、对比度、灰度、饱和度、色调调节。
            - 新增屏幕暗角：支持暗角颜色、亮暗、羽化调节，并支持滤镜预设保存、读取、删除和重置。
            - 新增深色 / 浅色主题切换。
            - 升级录屏功能：从 SharpAvi 切换到 ScreenRecorderLib，输出 MP4 / H.264。
            - 录屏新增 30 / 60 / 120 FPS 下拉选择、码率选择、系统声音、麦克风、鼠标指针显示开关。
            - 截图录屏页新增截图目录和视频目录快速修改。
            - 实时监控页新增 FPS 采集快捷提示，可直接启用 PresentMon、重启采集、选择 PresentMon 或管理员重启。
            - FPS 采集默认开启，并优化 PresentMon 权限错误提示。
            - 优化截图工具：更大的工具栏、左右工具分区、取色器、放大预览、坐标 / 色值显示、`C` 复制色值、双击完成、右键取消。
            - 修正截图工具保存 / 完成逻辑：保存图片才落盘，完成复制到剪切板。
            - 文本标注背景改为透明，编辑对象时支持二次修改颜色和粗细。
            - 设置页新增关闭自动最小化到托盘、作者博客、留言酒馆和 GitHub 跳转。
            - 自动更新错误提示更清晰，GitHub 403 rate limit 会明确说明无法判断是否最新。
            - 修复首次启动可能因主题资源只读导致失败的问题。
            - 移除最小化到托盘、截图、录屏的 Windows 气泡通知。
            - 移除控件焦点虚线框，减少切换应用回来后的视觉干扰。
