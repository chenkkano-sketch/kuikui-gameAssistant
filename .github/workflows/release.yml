name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Package app
        id: package
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }

          $version = $version.TrimStart([char[]]@("v", "V"))
          .\scripts\package.ps1 -Version $version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: KuikuiGameAssistant v${{ steps.package.outputs.version }}
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            artifacts/KuikuiGameAssistant-${{ steps.package.outputs.version }}-win-x64-portable.zip
            artifacts/KuikuiGameAssistant-${{ steps.package.outputs.version }}-setup.exe
            artifacts/KuikuiGameAssistant-win-x64-portable.zip
            artifacts/KuikuiGameAssistant-setup.exe
          body: |
            ## 下载版本

            本次发布版本：v${{ steps.package.outputs.version }}

            ## 下载文件

            - 安装版：KuikuiGameAssistant-${{ steps.package.outputs.version }}-setup.exe
            - 便携版：KuikuiGameAssistant-${{ steps.package.outputs.version }}-win-x64-portable.zip

            ## 固定下载链接

            - 最新安装版：https://github.com/chenkkano-sketch/kuikui-gameAssistant/releases/latest/download/KuikuiGameAssistant-setup.exe
            - 最新便携版：https://github.com/chenkkano-sketch/kuikui-gameAssistant/releases/latest/download/KuikuiGameAssistant-win-x64-portable.zip

            安装版适合长期使用；便携版解压后直接运行 `KuikuiGameAssistant.exe`。

            ## v1.0.3 更新内容

            - 悬浮窗新增快捷键启用开关，关闭后会注销打开/关闭悬浮窗的全局快捷键。
            - 悬浮窗背景透明度最低支持 0%，只隐藏背景，不影响 FPS、CPU、GPU 等文字显示。
            - 悬浮窗新增固定模式，开启后鼠标可穿透悬浮窗并点击后面的游戏或窗口。
            - 悬浮窗尺寸下限进一步放宽，横版和竖版都能调得更紧凑。
            - 收紧悬浮窗内边距、模块间距和竖版标签列宽，减少上下左右空白。
